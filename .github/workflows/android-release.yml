name: Release (Termux:X11 ARMv7/ARMv8)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.0.0)"
        required: true
      release_notes:
        description: "Release notes"
        required: true
      clean_version:
        description: "Build app without git hash suffix"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Termux ${{ matrix.arch_label }}
    runs-on: ubuntu-24.04 # Фиксируем LTS версию для стабильности пакетов apt
    env:
      VERSION: ${{ github.event.inputs.version }}
      APP_RELEASE_BUILD: ${{ github.event.inputs.clean_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: ARMv7
            dpkg_arch: armhf
            suffix: termux-armv7
            compiler_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cmake_processor: armv7-a
            c_compiler: arm-linux-gnueabihf-gcc
            cxx_compiler: arm-linux-gnueabihf-g++
          
          - arch_label: ARMv8
            dpkg_arch: arm64
            suffix: termux-armv8
            compiler_pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            cmake_processor: aarch64
            c_compiler: aarch64-linux-gnu-gcc
            cxx_compiler: aarch64-linux-gnu-g++

    steps:
      - uses: actions/checkout@v4

      # 1. Настройка dpkg, репозиториев и установка компиляторов с библиотеками
      - name: Install Cross-Compiler and Libraries
        run: |
          # Включаем нужную архитектуру из матрицы (armhf или arm64)
          sudo dpkg --add-architecture ${{ matrix.dpkg_arch }}
          sudo apt-get update
          
          # Устанавливаем сам кросс-компилятор
          sudo apt-get install -y ${{ matrix.compiler_pkg }}
          
          # Устанавливаем все запрашиваемые библиотеки для целевой архитектуры
          sudo apt-get install -y \
            libx11-dev:${{ matrix.dpkg_arch }} \
            libxrandr-dev:${{ matrix.dpkg_arch }} \
            libudev-dev:${{ matrix.dpkg_arch }} \
            libgl1-mesa-dev:${{ matrix.dpkg_arch }} \
            libxcursor-dev:${{ matrix.dpkg_arch }} \
            libxi-dev:${{ matrix.dpkg_arch }} \
            libfreetype6-dev:${{ matrix.dpkg_arch }} \
            libxinerama-dev:${{ matrix.dpkg_arch }} \
            libwayland-dev:${{ matrix.dpkg_arch }}

      # 2. Универсальная сборка проекта через подстановку параметров матрицы
      - name: Configure and Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_processor }} \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx_compiler }} \
            -DAPP_RELEASE_BUILD=${{ env.APP_RELEASE_BUILD }} \
            -DOPTIMIZE_FOR_NATIVE=OFF \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
          cmake --build build --config Release --target LatticeLab -j 4

      # 3. Подготовка дистрибутива
      - name: Prepare Release Dist
        shell: bash
        run: |
          archive_name="LatticeLab-${VERSION}-${{ matrix.suffix }}.tar.gz"
          mkdir -p release_dist/assets
          
          find build -type f -name "LatticeLab" -exec cp {} release_dist/ \;
          if [ -f build/Lattice/Lattice-cli ]; then
            find build/ -type f -name "Lattice-cli" -exec cp {} release_dist/ \;
          fi
          
          find build -type f -name "*.so*" -exec cp {} release_dist/ \; || true
          
          if [ -d assets ]; then cp -r assets/* release_dist/assets/; fi
          if [ -d Mods ]; then cp -r Mods release_dist/; fi
          if [ -d Plugins ]; then cp -r Plugins release_dist/; fi
          
          tar -czf "${archive_name}" -C release_dist .

      # 4. Загрузка артефактов (создадутся два разных архива)
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}-release
          path: LatticeLab-${{ env.VERSION }}-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Built Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      # Публикует сразу оба файла .tar.gz, которые придут из параллельных джоб
      - name: Publish Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: release_artifacts/**/*.tar.gz
          draft: true
          prerelease: false
